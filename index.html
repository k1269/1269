<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom 1269 | Portal</title>
    <style>
        :root {
            --gold: #C5A059;
            --dark-blue: #0A0F1A;
            --bg-color: #050505;
            --text-color: #E0E0E0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }
        .header { text-align: center; padding: 40px; }
        .logo { width: 300px; margin-bottom: 20px; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            margin-bottom: 50px;
        }
        .card {
            background: var(--dark-blue);
            border: 1px solid var(--gold);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: var(--gold);
        }
        .card:hover { background: #151d2e; }
        .card.disabled { cursor: not-allowed; opacity: 0.7; }
        footer { margin-top: auto; padding: 20px; color: var(--gold); font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="IMG_3934.png" alt="Kingdom 1269" class="logo">
        <h1>KINGDOM 1269 PORTAL</h1>
    </div>

    <div class="grid-container">
        <div class="card" onclick="checkAuth()">
            <h3>Operations Command Center</h3>
        </div>
        <div class="card disabled">
            <h3>Execution Court (Coming Soon)</h3>
        </div>
        <div class="card disabled">
            <h3>Bear Trap Calculator (Coming Soon)</h3>
        </div>
        <div class="card disabled">
            <h3>KvK Appointment Desk (Coming Soon)</h3>
        </div>
    </div>

    <footer>Designed by Hell</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9WCd_D9kKxFb6xP4IcWK46itFWNOuU5g",
            authDomain: "kingdom-1269-portal.firebaseapp.com",
            projectId: "kingdom-1269-portal",
            storageBucket: "kingdom-1269-portal.firebasestorage.app",
            messagingSenderId: "1007373803222",
            appId: "1:1007373803222:web:bcb85595a99da596aaf377"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        window.checkAuth = async () => {
            if (!auth.currentUser) {
                try {
                    const result = await signInWithPopup(auth, provider);
                    handleUser(result.user);
                } catch (e) { alert("Login failed"); }
            } else {
                handleUser(auth.currentUser);
            }
        };

        async function handleUser(user) {
            const userRef = doc(db, "users", user.uid);
            const userDoc = await getDoc(userRef);

            if (!userDoc.exists()) {
                const inGameName = prompt("Enter your In-Game Name:");
                if (inGameName) {
                    await setDoc(userRef, {
                        email: user.email,
                        inGameName: inGameName,
                        role: "pending"
                    });
                    alert("Request submitted! Waiting for Admin approval.");
                }
            } else {
                const data = userDoc.data();
                if (data.role === "admin" || data.role === "member") {
                    window.location.href = "command-center.html";
                } else {
                    alert("Status: " + data.role + ". Please wait for approval.");
                }
            }
        }
    </script>
</body>
</html>
