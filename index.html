<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom 1269 | Operation Portal</title>
    <style>
        /* التنسيق العام */
        body {
            background-color: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            user-select: none; /* منع تحديد النصوص */
            -webkit-user-select: none;
            overflow: hidden;
        }

        /* الووترمارك - اسم المملكة */
        .watermark {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 100px;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }

        /* الهيدر */
        header { text-align: center; padding: 40px 20px; }
        header img { width: 180px; height: auto; margin-bottom: 10px; }

        /* منطقة تسجيل الدخول */
        main { flex: 1; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #1a1a1a; padding: 50px; border-radius: 15px; text-align: center; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { padding: 15px 40px; background: #c5a059; color: #000; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; font-size: 16px; transition: 0.3s; }
        button:hover { background: #d4b06a; }

        /* الفوتر */
        footer { text-align: center; padding: 20px; font-size: 12px; color: #444; }
    </style>
</head>
<body>

    <div class="watermark" id="userWatermark">KINGDOM 1269</div>

    <header>
        <img src="IMG_3934.png" alt="Kingdom 1269 Logo">
        <h1>Kingdom 1269 Portal</h1>
    </header>

    <main>
        <div class="login-box" id="auth-section">
            <p>Welcome Commander. Please login to access the Operations Center.</p>
            <button id="loginBtn">Login with Google</button>
        </div>
    </main>

    <footer>
        <p>Kingdom 1269 System | Design by Hell</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9WCd_D9kKxFb6xP4IcWK46itFWNOuU5g",
            authDomain: "kingdom-1269-portal.firebaseapp.com",
            projectId: "kingdom-1269-portal",
            storageBucket: "kingdom-1269-portal.firebasestorage.app",
            messagingSenderId: "1007373803222",
            appId: "1:1007373803222:web:bcb85595a99da596aaf377"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        // عملية تسجيل الدخول
        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, provider).catch((error) => console.error(error));
        });

        // مراقبة حالة المستخدم
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('userWatermark').innerText = user.displayName;
                
                // التحقق من الصلاحيات في قاعدة البيانات
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists()) {
                        const role = userDoc.data().role;
                        if (role === 'admin' || role === 'member') {
                            window.location.href = "command-center.html";
                        } else {
                            alert("Your account is pending approval.");
                        }
                    } else {
                        alert("Account not found in system. Contact Admin.");
                    }
                } catch (e) {
                    console.error("Error accessing database:", e);
                }
            }
        });
    </script>
</body>
</html>
