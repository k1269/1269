<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Kingdom 1269 Portal</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9WCd_D9kKxFb6xP4IcWK46itFWNOuU5g",
            authDomain: "kingdom-1269-portal.firebaseapp.com",
            projectId: "kingdom-1269-portal",
            storageBucket: "kingdom-1269-portal.firebasestorage.app",
            messagingSenderId: "1007373803222",
            appId: "1:1007373803222:web:bcb85595a99da596aaf377"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore();
        const provider = new GoogleAuthProvider();

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        window.register = async () => {
            const name = document.getElementById('ign').value;
            if(!name) return alert("الرجاء إدخال اسمك في اللعبة");
            const user = auth.currentUser;
            await setDoc(doc(db, "users", user.uid), {
                name: name,
                email: user.email,
                status: 'pending',
                role: 'member'
            });
            location.reload();
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                document.getElementById('login-view').style.display = 'block';
            } else {
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (!docSnap.exists()) {
                    document.getElementById('register-view').style.display = 'block';
                } else {
                    const data = docSnap.data();
                    if (data.status === 'pending') {
                        document.getElementById('pending-view').style.display = 'block';
                    } else {
                        document.getElementById('portal-view').style.display = 'block';
                        document.getElementById('username').innerText = data.name;
                    }
                }
            }
        });
    </script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .view { display: none; }
        input { padding: 10px; border-radius: 5px; border: none; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 8px; border: none; background: #3b82f6; color: white; margin: 5px; }
    </style>
</head>
<body>
    <div id="login-view" class="view">
        <h1>Welcome to Kingdom 1269</h1>
        <button onclick="login()">Login with Google</button>
    </div>
    <div id="register-view" class="view">
        <h2>Enter In-Game Name</h2>
        <input type="text" id="ign" placeholder="Your Name">
        <button onclick="register()">Submit</button>
    </div>
    <div id="pending-view" class="view">
        <h2>Request Pending</h2>
        <p>جاري مراجعة طلبك من قبل الإدارة.</p>
    </div>
    <div id="portal-view" class="view">
        <h1>Welcome, <span id="username"></span></h1>
        <a href="op-center.html"><button>Enter Command Center</button></a>
        <br><br>
        <button onclick="logout()">Logout</button>
    </div>
</body>
</html>
